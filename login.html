<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Golden Spoon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('assets/background-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            color: white;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #d4af37;
            background: transparent;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #d4af37;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background: #b8962d;
        }
        h2 { color: #d4af37; margin-bottom: 20px; }
        a { color: #d4af37; text-decoration: none; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Login Form -->
        <div id="loginSection">
            <h2>LOGIN</h2>
            <input type="text" id="phone" placeholder="Enter Phone Number">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="login()">LOGIN</button>
            <p style="font-size: 12px; margin-top: 15px;">
                <a onclick="showForgot()">Forgot Password?</a>
            </p>
            <p style="font-size: 12px; margin-top: 5px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>

        <!-- Forgot Password / OTP Section -->
        <div id="forgotSection" class="hidden">
            <h2>RESET PASSWORD</h2>
            <input type="text" id="resetPhone" placeholder="Enter Registered Phone">
            <button id="sendOtpBtn" onclick="sendOtp()">SEND OTP</button>
            
            <div id="otpBlock" class="hidden">
                <input type="text" id="enteredOtp" placeholder="Enter 4-Digit OTP">
                <input type="password" id="newPassword" placeholder="Enter New Password">
                <button onclick="verifyAndReset()">UPDATE PASSWORD</button>
            </div>
            <p style="font-size: 12px; margin-top: 15px;">
                <a onclick="showLogin()">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        let generatedOtp = "";

        async function login() {
            const data = { 
                phone: document.getElementById('phone').value, 
                password: document.getElementById('password').value 
            };
            
            const res = await fetch('/login-user', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            
            const result = await res.json();
            if(result.success) { 
                window.location.href = 'order.html'; 
            } else { 
                alert("Login Failed! Please check your credentials."); 
            }
        }

        function showForgot() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('forgotSection').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('forgotSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        function sendOtp() {
            const phone = document.getElementById('resetPhone').value;
            if(!phone) {
                alert("Please enter your phone number first!");
                return;
            }
            // 4-digit random demo OTP generate karna
            generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
            alert("Demo OTP sent to " + phone + "\nYour OTP is: " + generatedOtp);
            
            document.getElementById('otpBlock').classList.remove('hidden');
            document.getElementById('sendOtpBtn').style.display = 'none';
        }

        async function verifyAndReset() {
            const phone = document.getElementById('resetPhone').value;
            const userOtp = document.getElementById('enteredOtp').value;
            const newPassword = document.getElementById('newPassword').value;

            if (userOtp !== generatedOtp) {
                alert("Invalid OTP! Please try again.");
                return;
            }

            if (!newPassword) {
                alert("Please enter a new password!");
                return;
            }

            // Backend par password update karne ki request (Iske liye app.py mein ek chhota route add karna padega, niche bataya gaya hai)
            const res = await fetch('/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, newPassword })
            });

            const result = await res.json();
            if(result.success) {
                alert("Password updated successfully! Please login now.");
                showLogin();
            } else {
                alert("Error: " + result.message);
            }
        }
    </script>
</body>
</html>
