<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Golden Spoon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* Background image ka path yahan sahi rakhein */
            background: url('assets/background-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            color: white;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #d4af37;
            background: transparent;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; /* Input ko box se bahar nikalne se rokta hai */
        }
        button {
            width: 100%;
            padding: 10px;
            background: #d4af37;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background: #b8962d;
        }
        h2 { color: #d4af37; margin-bottom: 20px; }
        a { color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>LOGIN</h2>
        <input type="text" id="phone" placeholder="Enter Phone Number">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">LOGIN</button>
        <p style="font-size: 12px; margin-top: 15px;">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>

    <script>
        async function login() {
            const data = { 
                phone: document.getElementById('phone').value, 
                password: document.getElementById('password').value 
            };
            
            const res = await fetch('/login-user', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            
            const result = await res.json();
            
            if(result.success) { 
                // Login successful hone par seedha order page par redirect
                window.location.href = 'order.html'; 
            } else { 
                alert("Login Failed! Please check your credentials."); 
            }
        }
    </script>
</body>
</html>
