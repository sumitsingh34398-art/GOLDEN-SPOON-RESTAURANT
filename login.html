<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Golden Spoon Restaurant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('assets/background-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.92);
            padding: 35px 30px;
            border: 2px solid #d4af37;
            border-radius: 16px;
            color: white;
            text-align: center;
            width: 100%;
            max-width: 420px;
            margin: 15px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px rgba(212, 175, 55, 0.2);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0;
            border: 1px solid #d4af37;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        input:focus {
            outline: none;
            border-color: #f3e5ab;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        button:hover {
            background: linear-gradient(135deg, #e6c547, #d4af37);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
            transform: translateY(-1px);
        }
        h2 { 
            color: #d4af37; 
            margin-top: 0; 
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            font-size: 26px;
            margin-bottom: 20px;
        }
        a { 
            color: #d4af37; 
            text-decoration: none; 
            cursor: pointer; 
            font-weight: 600;
            transition: color 0.2s;
        }
        a:hover {
            color: #f3e5ab;
            text-decoration: underline;
        }
        
        .hidden { display: none !important; }

        /* Professional Luxury Custom Modal Styles (Matching Ref Image) */
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: radial-gradient(circle at center, #181818 0%, #0c0c0c 100%);
            border: 2px solid #d4af37;
            padding: 35px 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            color: white;
            animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            position: relative;
        }
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-logo {
            width: 55px;
            height: 55px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .modal-logo span {
            font-size: 24px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: #e0e0e0;
            margin-bottom: 20px;
            font-weight: 400;
            font-family: 'Poppins', sans-serif;
        }

        .modal-content p {
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
            white-space: pre-line;
            color: #cccccc;
            letter-spacing: 0.3px;
            font-family: 'Poppins', sans-serif;
        }
        .modal-btn {
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            border: none;
            padding: 13px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            color: #000;
            width: 100%;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            font-family: 'Poppins', sans-serif;
        }
        .modal-btn:hover {
            background: linear-gradient(135deg, #e6c547, #d4af37);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Login Form -->
        <div id="loginSection">
            <h2>LOGIN</h2>
            <input type="text" id="phone" placeholder="Enter Phone Number">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="login()">LOGIN</button>
            <p style="font-size: 13px; margin-top: 15px;">
                <a onclick="showForgot()">Forgot Password?</a>
            </p>
            <p style="font-size: 13px; margin-top: 8px; color: #bbb;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>

        <!-- Forgot Password / OTP Section -->
        <div id="forgotSection" class="hidden">
            <h2>RESET PASSWORD</h2>
            <input type="text" id="resetPhone" placeholder="Enter Registered Phone">
            <button id="sendOtpBtn" onclick="sendOtp()">SEND OTP</button>
            
            <div id="otpBlock" class="hidden">
                <input type="text" id="enteredOtp" placeholder="Enter 4-Digit OTP" maxlength="4" style="text-align: center; font-size: 18px; letter-spacing: 5px;">
                <input type="password" id="newPassword" placeholder="Enter New Password">
                <button onclick="verifyAndReset()">UPDATE PASSWORD</button>
            </div>
            <p style="font-size: 13px; margin-top: 15px;">
                <a onclick="showLogin()">Back to Login</a>
            </p>
        </div>
    </div>

    <!-- Custom Professional Alert Modal Container (Default Hidden) -->
    <div id="customModal" class="custom-modal hidden">
        <div class="modal-content">
            <div class="modal-logo">
                <span>🍽️</span>
            </div>
            <h3 class="modal-title" id="modalTitle">GOLDEN SPOON</h3>
            <div class="modal-subtitle" id="modalSub">Restaurant Notification</div>
            <p id="modalMessage">Message here</p>
            <button class="modal-btn" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        let generatedOtp = "";

        // Professional Alert Function
        function showCustomAlert(message, callback = null, title = "GOLDEN SPOON", subtitle = "Notification") {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalSub').innerText = subtitle;
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('customModal').classList.remove('hidden');
            window.modalCallback = callback;
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }

        async function login() {
            const data = { 
                phone: document.getElementById('phone').value, 
                password: document.getElementById('password').value 
            };
            
            const res = await fetch('/login-user', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            
            const result = await res.json();
            if(result.success) { 
                window.location.href = 'order.html'; 
            } else { 
                showCustomAlert("Login Failed! Please check your credentials.", null, "LOGIN ERROR", "Authentication Failed"); 
            }
        }

        function showForgot() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('forgotSection').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('forgotSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        function sendOtp() {
            const phone = document.getElementById('resetPhone').value;
            if(!phone) {
                showCustomAlert("Please enter your phone number first!", null, "INPUT REQUIRED", "Phone Number Missing");
                return;
            }
            generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
            showCustomAlert("Demo OTP sent to " + phone + "\nYour OTP is: " + generatedOtp, null, "VERIFICATION CODE", "Secure OTP Generated");
            
            document.getElementById('otpBlock').classList.remove('hidden');
            document.getElementById('sendOtpBtn').style.display = 'none';
        }

        async function verifyAndReset() {
            const phone = document.getElementById('resetPhone').value;
            const userOtp = document.getElementById('enteredOtp').value;
            const newPassword = document.getElementById('newPassword').value;

            if (userOtp !== generatedOtp) {
                showCustomAlert("Invalid OTP! Please try again.", null, "INVALID OTP", "Verification Failed");
                return;
            }

            if (!newPassword) {
                showCustomAlert("Please enter a new password!", null, "PASSWORD REQUIRED", "Missing Information");
                return;
            }

            const res = await fetch('/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, newPassword })
            });

            const result = await res.json();
            if(result.success) {
                showCustomAlert("Password updated successfully! Please login now.", () => {
                    showLogin();
                }, "SUCCESS", "Password Changed");
            } else {
                showCustomAlert("Error: " + result.message, null, "UPDATE FAILED", "System Error");
            }
        }
    </script>
</body>
</html>
