<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Gallery | Golden Spoon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('assets/background.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; color: #fff; padding: 40px 20px;
        }

        .back-btn { 
            position: absolute; top: 30px; left: 30px; color: #d4af37; 
            text-decoration: none; border: 1px solid #d4af37; padding: 10px 20px; 
            font-size: 12px; letter-spacing: 2px; transition: 0.3s;
            z-index: 10;
        }
        .back-btn:hover { background: #d4af37; color: #000; }

        .page-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.5rem;
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-align: center;
        }

        .gallery-container { 
            width: 90%; max-width: 850px; border: 1px solid #d4af37; 
            padding: 20px; text-align: center; background: rgba(0,0,0,0.7); 
            position: relative; margin-bottom: 50px;
        }

        .slider-image { width: 100%; height: 450px; object-fit: cover; border: 1px solid #d4af37; transition: opacity 0.2s ease; }

        /* Professional Round Buttons */
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(212, 175, 55, 0.9); color: #000; 
            border: none; width: 50px; height: 50px; border-radius: 50%; 
            cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.3s;
            z-index: 5;
        }
        .nav-btn:hover { background: #fff; transform: translateY(-50%) scale(1.1); }
        .prev { left: -25px; }
        .next { right: -25px; }
        
        .caption { margin-top: 20px; font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #d4af37; }

        /* Side-by-Side Grid Gallery Section */
        .grid-section-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
            width: 90%;
            max-width: 1200px;
        }

        .side-by-side-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 60px;
        }

        .grid-card {
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 6px;
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }

        .grid-card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        .grid-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .grid-card p {
            padding: 12px;
            font-size: 14px;
            color: #d4af37;
            font-family: 'Playfair Display', serif;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .back-btn {
                position: relative;
                top: unset;
                left: unset;
                margin-bottom: 20px;
            }
            body {
                justify-content: flex-start;
                padding: 20px 10px;
            }
            .slider-image {
                height: 280px;
            }
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .prev { left: -10px; }
            .next { right: -10px; }
            .side-by-side-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .page-title {
                font-size: 1.8rem;
                margin-top: 10px;
            }
        }

        @media (max-width: 480px) {
            .side-by-side-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">&#8592; BACK TO HOME</a>

    <h1 class="page-title">OUR GALLERY</h1>

    <div class="gallery-container">
        <img id="galleryImg" src="assets/lamb-chops.jpg" class="slider-image">
        <button class="nav-btn prev" onclick="changeImage(-1)">&#10094;</button>
        <button class="nav-btn next" onclick="changeImage(1)">&#10095;</button>
        <p id="caption" class="caption">Lamb Chops</p>
    </div>

    <!-- Side-by-Side Gallery Grid -->
    <h2 class="grid-section-title">All Photos Collection</h2>
    <div class="side-by-side-grid" id="sideBySideGrid">
        <!-- JavaScript will dynamically load all images here side-by-side -->
    </div>

    <script>
        const images = [
            { src: "images/industrial interior design.jpg", name: "industrial interior design" },
            { src: "images/Cashier Desk System.jpg", name: "Cashier Desk System" },
            { src: "images/Family Table.jpg", name: "Family Table" },
            { src: "assets/lamb-chops.jpg", name: "Lamb Chops" },
            { src: "assets/spaghetti.jpg", name: "Spaghetti" },
            { src: "assets/grilled-salmon.jpg", name: "Grilled Salmon" },
            { src: "assets/chocolate-dessert.jpg", name: "Chocolate Dessert" },
            { src: "assets/mushroom-steak.jpg", name: "Mushroom Steak" },
            { src: "assets/healthy-balanced-meal-grilled.jpg", name: "healthy-balanced-meal-grilled" },
            { src: "assets/roasted-chicken-dinner.jpg", name: "roasted-chicken-dinner" },
            { src: "assets/dradon fruit salad.jpg", name: "dradon fruit salad" },
            { src: "assets/pani puri.jpg", name: "pani puri" },
            { src: "assets/grilled-dorade-vernick-fish.jpg", name: "grilled-dorade-vernick-fish" }
        ];

        let index = 0;
        function changeImage(dir) {
            index = (index + dir + images.length) % images.length;
            document.getElementById('galleryImg').src = images[index].src;
            document.getElementById('caption').innerText = images[index].name;
            // Add a small fade effect
            document.getElementById('galleryImg').style.opacity = 0.5;
            setTimeout(() => { document.getElementById('galleryImg').style.opacity = 1; }, 200);
        }

        // Generate Side-by-Side Grid Dynamically from the same array
        const gridContainer = document.getElementById('sideBySideGrid');
        images.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'grid-card';
            card.innerHTML = `
                <img src="${item.src}" alt="${item.name}" loading="lazy">
                <p>${item.name}</p>
            `;
            // Clicking grid image can also switch the main slider if desired
            card.onclick = () => {
                index = idx;
                document.getElementById('galleryImg').src = images[index].src;
                document.getElementById('caption').innerText = images[index].name;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
