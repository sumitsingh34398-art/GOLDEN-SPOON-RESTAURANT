<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Spoon - Premium Menu & Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.88)), url('assets/background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #fff; 
            display: flex; 
            flex-direction: row;
            min-height: 100vh; 
        }
        
        /* Layout Structure */
        .menu-section { width: 70%; padding: 40px; }
        .checkout-section { 
            width: 30%; 
            background: radial-gradient(circle at center, #181818 0%, #0c0c0c 100%); 
            padding: 30px; 
            border-left: 2px solid #d4af37; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            color: #d4af37; 
            font-size: 38px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 25px; 
            color: #d4af37; 
            border: 1px solid #d4af37; 
            padding: 8px 16px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* Menu Grid System */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid #333; 
            padding: 18px; 
            border-radius: 14px; 
            text-align: center; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover {
            border-color: #d4af37;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.15);
        }
        .card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid #444; 
        }
        .card h4 { font-size: 15px; margin-bottom: 6px; font-weight: 600; color: #f0f0f0; }
        .card p { color: #d4af37; font-weight: bold; margin-bottom: 12px; font-size: 15px; }
        
        .controls { display: flex; justify-content: center; gap: 12px; align-items: center; }
        .btn-qty { 
            background: linear-gradient(135deg, #d4af37, #aa8c2c); 
            border: none; 
            padding: 6px 14px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            color: #000;
            transition: all 0.2s;
        }
        .btn-qty:hover { background: #f3e5ab; box-shadow: 0 0 8px rgba(212, 175, 55, 0.5); }
        .controls span { font-weight: 600; min-width: 20px; text-align: center; }

        /* Checkout Panel Styles */
        .checkout-section h2 { 
            font-family: 'Playfair Display', serif;
            color: #d4af37; 
            margin-bottom: 20px; 
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .input-group { margin-bottom: 12px; }
        .input-group input { 
            width: 100%; 
            padding: 11px 14px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #d4af37; 
            color: #fff; 
            border-radius: 6px; 
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f3e5ab;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }
        
        #cartItems { 
            margin: 15px 0; 
            font-size: 13px; 
            color: #cccccc; 
            max-height: 180px; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        #cartItems::-webkit-scrollbar { width: 4px; }
        #cartItems::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }

        /* Bill Summary Styling with Service Charge & GST */
        .bill-summary {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            color: #ddd;
        }
        .bill-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        #cartTotal { 
            font-size: 17px; 
            color: #d4af37; 
            margin-top: 6px; 
            padding-top: 8px; 
            border-top: 1px dashed rgba(212, 175, 55, 0.4);
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        
        .place-order-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #d4af37, #aa8c2c); 
            border: none; 
            padding: 13px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            color: #000;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }
        .place-order-btn:hover { 
            background: linear-gradient(135deg, #e6c547, #d4af37); 
            box-shadow: 0 6px 18px rgba(212, 175, 55, 0.5); 
        }

        .logout-btn { 
            width: 100%; 
            background: transparent; 
            border: 1px solid #d4af37; 
            color: #d4af37; 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { 
            background: rgba(212, 175, 55, 0.1); 
            color: #f3e5ab; 
        }

        /* Professional Luxury Modal Box (Matching Previous Theme) */
        .custom-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.88); 
            backdrop-filter: blur(8px);
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
        }
        .modal-box-content {
            background: radial-gradient(circle at center, #181818 0%, #0c0c0c 100%);
            border: 2px solid #d4af37; 
            padding: 35px 30px; 
            border-radius: 20px; 
            text-align: center; 
            color: #fff; 
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-logo {
            width: 55px; height: 55px;
            border: 2px solid #d4af37; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px auto;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            font-size: 24px;
        }
        .modal-btn {
            background: linear-gradient(135deg, #d4af37, #aa8c2c); 
            border: none; 
            padding: 12px 20px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 8px; 
            color: #000;
            width: 100%;
            margin-top: 15px;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.3s;
        }
        .modal-btn:hover { background: linear-gradient(135deg, #e6c547, #d4af37); }

        /* Responsive Breakpoints for Mobile & Tablet */
        @media(max-width: 1024px) {
            body { flex-direction: column; }
            .menu-section { width: 100%; padding: 20px; }
            .checkout-section { width: 100%; border-left: none; border-top: 2px solid #d4af37; padding: 25px 20px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
        @media(max-width: 580px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="menu-section">
    <a href="index.html" class="back-btn">&#8592; BACK TO HOME</a>
    <h1>OUR PREMIUM MENU</h1>
    <div class="grid" id="menuGrid"></div>
</div>

<div class="checkout-section">
    <h2>CHECKOUT</h2>
    <div class="input-group"><input type="text" id="userName" placeholder="Full Name"></div>
    <div class="input-group"><input type="tel" id="userPhone" placeholder="Phone Number"></div>
    <div class="input-group"><input type="text" id="userAddress" placeholder="Delivery Address"></div>
    <div id="cartItems"></div>
    
    <!-- Bill Summary with Service Charge (2%) & GST (1.5%) matching your invoice -->
    <div class="bill-summary">
        <div class="bill-row"><span>Subtotal:</span> <span id="subTotal">₹0.00</span></div>
        <div class="bill-row"><span>Service Charge (2%):</span> <span id="serviceCharge">₹0.00</span></div>
        <div class="bill-row"><span>GST (1.5%):</span> <span id="gstAmount">₹0.00</span></div>
        <div class="bill-row" id="cartTotal"><span>TOTAL:</span> <span id="finalTotal">₹0.00</span></div>
    </div>

    <button class="place-order-btn" onclick="placeOrder()">PLACE ORDER</button>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
</div>

<!-- Luxury Custom Modal Box -->
<div id="orderModal" class="custom-modal">
    <div class="modal-box-content">
        <div class="modal-logo">🍽️</div>
        <h2 id="modalTitle" style="color:#d4af37; font-family:'Playfair Display', serif; font-size:22px; margin-bottom:8px;">Order Status</h2>
        <div style="font-size: 13px; color: #bbb; margin-bottom: 15px;">Golden Spoon Restaurant</div>
        <p id="modalMsg" style="margin:10px 0 20px 0; font-size:14px; color:#ddd; line-height:1.5;"></p>
        <button class="modal-btn" onclick="closeModal()">CONTINUE</button>
    </div>
</div>

<script>
    // 1. Session Protection Check
    fetch('/check-session').then(res => res.json()).then(data => {
        if(!data.logged_in) { window.location.href = 'login.html'; }
    });

    // 2. Logout Function - Redirect to Home Page
    function logout() {
        fetch('/logout').then(() => { window.location.href = 'index.html'; });
    }

    let subtotal = 0;
    let serviceCharge = 0;
    let gst = 0;
    let finalTotal = 0;
    
    // Aapki saari original 20 dishes bilkul waisi ki waisi hain
    let dishes = [
        { name: "salmon bruschetta", price: 450, img: "images/salmon bruschetta.jpg" },
        { name: "grilled-salmon", price: 500, img: "assets/grilled-salmon.jpg" },
        { name: "spaghetti", price: 350, img: "assets/spaghetti.jpg" },
        { name: "roasted-dinner", price: 900, img: "assets/roasted-chicken-dinner.jpg" },
        { name: "grilled-fish", price: 1200, img: "assets/grilled-dorade-vernick-fish.jpg" },
        { name: "lamb-chops", price: 1800, img: "assets/lamb-chops.jpg" },
        { name: "dradon-fruit-salad", price: 200, img: "assets/dradon fruit salad.jpg" },
        { name: "pani puri", price: 100, img: "assets/pani puri.jpg" },
        { name: "mushroom-steak", price: 680, img: "assets/mushroom-steak.jpg" },
        { name: "Burger", price: 200, img: "images/Burger.png" },
        { name: "healthy-grilled", price: 300, img: "assets/healthy-balanced-meal-grilled.jpg" },
        { name: "Mixer-veg", price: 1500, img: "images/Mixer-veg.jpg" },
        { name: "Wine Bottle", price: 1300, img: "images/Wine Bottle.png" },
        { name: "Venison Loin", price: 1550, img: "assets/roasted-chicken-dinner.jpg" },
        { name: "Champagne Flutes", price: 1500, img: "images/Champagne Flutes.jpg" },
        { name: "chocolate-dessert", price: 650, img: "assets/chocolate-dessert.jpg" },
        { name: "pizza", price: 450, img: "images/pizza.jpg" },
        { name: "Tossed garden salad", price: 550, img: "images/Tossed garden salad.jpg" },
        { name: "Coffee continental breakfast", price: 500, img: "images/Coffee continental breakfast .jpg" },
        { name: "Full tablet with drinké", price: 2000, img: "images/Full tablet with drink.jpg" }
    ];

    // Initialize quantity and id for static dishes
    dishes.forEach((d, i) => { d.qty = 0; d.id = i; });

    // Database se naye items fetch karke append karne ka function
    function fetchExtraMenu() {
        fetch('/get-menu')
        .then(res => res.json())
        .then(data => {
            data.forEach((d, index) => {
                let exists = dishes.some(item => item.name.toLowerCase() === d[1].toLowerCase());
                if (!exists) {
                    dishes.push({
                        id: dishes.length,
                        name: d[1],
                        price: d[2],
                        img: d[3],
                        qty: 0
                    });
                }
            });
            renderMenu();
        }).catch(err => {
            renderMenu(); 
        });
    }

    function renderMenu() {
        const menuGrid = document.getElementById('menuGrid');
        menuGrid.innerHTML = dishes.map(d => `
            <div class="card">
                <img src="${d.img}" alt="${d.name}">
                <h4>${d.name}</h4>
                <p>₹${d.price}</p>
                <div class="controls">
                    <button class="btn-qty" onclick="updateQty(${d.id}, -1)">-</button>
                    <span>${d.qty}</span>
                    <button class="btn-qty" onclick="updateQty(${d.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function renderCart() {
        const cartItems = document.getElementById('cartItems');
        cartItems.innerHTML = dishes.filter(d => d.qty > 0).map(d => 
            `<div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                <span>${d.name} x ${d.qty}</span> <span>₹${d.price * d.qty}.00</span>
            </div>`
        ).join('');
        
        subtotal = dishes.reduce((sum, d) => sum + (d.price * d.qty), 0);
        serviceCharge = subtotal * 0.02; // 2% Service Charge
        gst = subtotal * 0.015;          // 1.5% GST
        finalTotal = subtotal + serviceCharge + gst;

        document.getElementById('subTotal').innerText = "₹" + subtotal.toFixed(2);
        document.getElementById('serviceCharge').innerText = "₹" + serviceCharge.toFixed(2);
        document.getElementById('gstAmount').innerText = "₹" + gst.toFixed(2);
        document.getElementById('finalTotal').innerText = "₹" + finalTotal.toFixed(2);
    }

    function updateQty(id, val) {
        let item = dishes.find(d => d.id === id);
        if (item && item.qty + val >= 0) {
            item.qty += val;
            renderMenu();
            renderCart();
        }
    }

    async function placeOrder() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const address = document.getElementById('userAddress').value;

        if (finalTotal > 0 && name !== "" && phone !== "" && address !== "") {
            const orderData = { 
                name, 
                phone, 
                address, 
                items: dishes.filter(d => d.qty > 0), 
                subtotal: subtotal.toFixed(2), 
                serviceCharge: serviceCharge.toFixed(2),
                gst: gst.toFixed(2), 
                total: finalTotal.toFixed(2) 
            };
            
            let message = `*New Order Received!*%0A%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}%0A%0A*Items:*%0A`;
            orderData.items.forEach(d => message += `• ${d.name} (x${d.qty}) = ₹${d.price * d.qty}.00%0A`);
            message += `%0A*Subtotal:* ₹${subtotal.toFixed(2)}%0A*Service Charge (2%):* ₹${serviceCharge.toFixed(2)}%0A*GST (1.5%):* ₹${gst.toFixed(2)}%0A*TOTAL: ₹${finalTotal.toFixed(2)}*`;
            
            window.open(`https://wa.me/919602697303?text=${message}`, '_blank');

            try {
                await fetch('/save-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                document.getElementById('orderModal').style.display = 'flex';
                document.getElementById('modalTitle').innerText = "Order Successful";
                document.getElementById('modalMsg').innerText = "Your order with Service Charge and GST has been placed successfully!";
            } catch (e) {
                console.log("Error:", e);
            }
        } else {
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = "Incomplete Details";
            document.getElementById('modalMsg').innerText = "Please fill all your details and select items to place an order.";
        }
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
    
    // Page load par static dishes ke sath database wale naye items bhi load honge
    fetchExtraMenu();
</script>
</body>
</html>
