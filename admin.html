<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golden Spoon Restaurant | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1950&q=80'); background-size: cover; background-attachment: fixed; color: #fff; padding: 20px; min-height: 100vh; margin: 0; }
        h1 { color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; }
        .login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #1a1a1a; padding: 40px; border: 2px solid #d4af37; border-radius: 15px; text-align: center; }
        .login-box input { padding: 12px; width: 250px; border-radius: 5px; border: 1px solid #d4af37; background: #000; color: #fff; margin-bottom: 15px; }
        .login-btn { background: #d4af37; border: none; padding: 10px 30px; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .nav-bar { text-align: center; margin-bottom: 25px; }
        .nav-btn { padding: 10px 20px; margin: 0 5px; cursor: pointer; border-radius: 20px; border: 1px solid #d4af37; background: transparent; color: #d4af37; font-weight: 600; transition: 0.3s; text-decoration: none; display: inline-block; }
        .nav-btn:hover, .nav-btn.active { background: #d4af37; color: #000; }
        input#searchInput { padding: 12px 20px; width: 350px; border-radius: 25px; border: 2px solid #d4af37; background: rgba(0,0,0,0.5); color: white; text-align: center; display: block; margin: 0 auto 20px; }
        table { width: 98%; margin: 0 auto; border-collapse: collapse; background: rgba(0, 0, 0, 0.8); border-radius: 10px; overflow: hidden; }
        th { background: #d4af37; color: #000; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; font-size: 13px; }
        .status-select { background: #000; color: #d4af37; border: 1px solid #d4af37; padding: 5px; border-radius: 5px; cursor: pointer; }
        .receipt-link { background: #d4af37; color: #000; padding: 6px 12px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 12px; display: inline-block; }
        .receipt-link:hover { background: #fff; }
        .admin-section { display: none; }
        .admin-section.active-section { display: block; }
        .menu-form { background: rgba(0,0,0,0.85); padding: 20px; border: 1px solid #d4af37; border-radius: 10px; width: 400px; margin: 0 auto 20px; text-align: center; }
        .menu-form input { padding: 10px; width: 90%; margin: 8px 0; border-radius: 5px; border: 1px solid #d4af37; background: #000; color: #fff; }
        .menu-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 95%; margin: 0 auto; }
        .menu-card { border: 1px solid #d4af37; padding: 15px; border-radius: 8px; width: 200px; background: rgba(0,0,0,0.8); text-align: center; position: relative; }
        .menu-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 10px; font-weight: bold; }
        .delete-btn:hover { background: #cc0000; }
        .clear-all-btn { background: #ff4d4d !important; color: white !important; border: 1px solid #ff4d4d !important; }
        .clear-all-btn:hover { background: #cc0000 !important; color: white !important; }
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <h2>🔒 Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <br>
            <button class="login-btn" onclick="checkPassword()">Login</button>
        </div>
    </div>

    <h1>Order Management Dashboard</h1>
    
    <div class="nav-bar">
        <button class="nav-btn active" id="tab-orders" onclick="switchDashboardTab('orders')">📦 Orders</button>
        <button class="nav-btn" id="tab-users" onclick="switchDashboardTab('users')">👥 Registered Users</button>
        <button class="nav-btn" id="tab-menu" onclick="switchDashboardTab('menu')">🍽️ Menu Management</button>
    </div>

    <div id="section-orders" class="admin-section active-section">
        <div class="nav-bar">
            <button class="nav-btn active" id="btn-all" onclick="fetchAndShow('all')">All</button>
            <button class="nav-btn" id="btn-today" onclick="fetchAndShow('today')">Today's</button>
            <a href="/download-csv" class="nav-btn">📥 Download CSV</a>
            <button class="nav-btn clear-all-btn" onclick="clearAllOrders()">🗑️ Clear All Orders</button>
        </div>
        
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 Search by Name or ID...">
        <table id="orderTable">
            <thead id="tableHead">
                <tr><th>ID</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Update</th><th>Receipt</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="section-users" class="admin-section">
        <h2 style="color: #d4af37; text-align: center;">Registered Customers List</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="window.open('/download-users-pdf', '_blank')" class="nav-btn" style="background: #d4af37; color: #000;">📥 Download Users PDF</button>
            <button onclick="clearAllUsers()" class="nav-btn clear-all-btn">🗑️ Clear All Users</button>
        </div>
        <table style="width: 70%;">
            <thead>
                <tr><th>User ID</th><th>Customer Name</th><th>Phone Number</th></tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </div>

    <div id="section-menu" class="admin-section">
        <h2 style="color: #d4af37; text-align: center;">Add New Menu Item</h2>
        <div class="menu-form">
            <input type="text" id="menuName" placeholder="Dish Name (e.g. Pasta)">
            <input type="number" id="menuPrice" placeholder="Price in ₹ (e.g. 350)">
            <input type="file" id="menuImageFile" accept="image/*" style="padding: 7px; background: #000; color: #fff; border: 1px solid #d4af37; border-radius: 5px; width: 90%;">
            <br>
            <button class="login-btn" onclick="addNewMenuItem()" style="margin-top: 10px;">Add Item</button>
        </div>
        <h2 style="color: #d4af37; text-align: center; margin-top: 30px;">Existing Menu Items</h2>
        <div id="menuGrid" class="menu-grid"></div>
    </div>

    <script>
        function checkPassword() {
            let pass = document.getElementById("adminPass").value;
            fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: "Sumit", password: pass}) })
            .then(res => res.ok ? (document.getElementById("loginModal").style.display = "none", fetchAndShow('all')) : alert("❌ Wrong Password!"));
        }

        function fetchAndShow(filter) {
            fetch(`/get-orders?filter=${filter}`)
            .then(res => res.json())
            .then(data => {
                const body = document.getElementById('tableBody');
                body.innerHTML = "";
                data.forEach(o => {
                    let status = o[7] ? o[7] : 'pending'; 
                    body.innerHTML += `<tr>
                        <td>${o[0]}</td>
                        <td>${o[1]}</td>
                        <td>${o[6]}</td>
                        <td>${parseItems(o[4])}</td>
                        <td>₹${o[5]}</td>
                        <td>${status.toUpperCase()}</td>
                        <td><select class="status-select" onchange="updateStatus('${o[0]}', this.value)">
                            <option value="pending" ${status=='pending'?'selected':''}>Pending</option>
                            <option value="preparing" ${status=='preparing'?'selected':''}>Preparing</option>
                            <option value="out for delivery" ${status=='out for delivery'?'selected':''}>Out for Delivery</option>
                            <option value="delivered" ${status=='delivered'?'selected':''}>Delivered</option>
                        </select></td>
                        <td><a href="/receipt/${o[0]}" target="_blank" class="receipt-link">🖨️ View Receipt</a></td>
                    </tr>`;
                });
            });
        }

        function parseItems(raw) { try { return JSON.parse(raw.replace(/'/g, '"')).map(i => `${i.name}(${i.qty})`).join(', '); } catch { return raw; } }
        
        function updateStatus(id, newStatus) { 
            fetch(`/update-order/${id}`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({status: newStatus}) 
            })
            .then(res => res.json())
            .then(data => {
                fetchAndShow('all');
            }); 
        }

        function searchTable() { let input = document.getElementById("searchInput").value.toUpperCase(); let rows = document.getElementById("tableBody").getElementsByTagName("tr"); for (let i = 0; i < rows.length; i++) { rows[i].style.display = rows[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none"; } }

        function switchDashboardTab(tab) {
            document.getElementById('section-orders').classList.remove('active-section');
            document.getElementById('section-users').classList.remove('active-section');
            document.getElementById('section-menu').classList.remove('active-section');

            document.getElementById('tab-orders').classList.remove('active');
            document.getElementById('tab-users').classList.remove('active');
            document.getElementById('tab-menu').classList.remove('active');

            if(tab === 'orders') {
                document.getElementById('section-orders').classList.add('active-section');
                document.getElementById('tab-orders').classList.add('active');
                fetchAndShow('all');
            } else if(tab === 'users') {
                document.getElementById('section-users').classList.add('active-section');
                document.getElementById('tab-users').classList.add('active');
                loadRegisteredUsers();
            } else if(tab === 'menu') {
                document.getElementById('section-menu').classList.add('active-section');
                document.getElementById('tab-menu').classList.add('active');
                loadAdminMenu();
            }
        }

        function loadRegisteredUsers() {
            fetch('/get-users')
            .then(res => res.json())
            .then(data => {
                let tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = "";
                data.forEach(u => {
                    tbody.innerHTML += `<tr><td>#${u[0]}</td><td>${u[1]}</td><td>${u[2]}</td></tr>`;
                });
            });
        }

        function loadAdminMenu() {
            fetch('/get-menu')
            .then(res => res.json())
            .then(data => {
                let grid = document.getElementById('menuGrid');
                grid.innerHTML = "";
                data.forEach(m => {
                    grid.innerHTML += `<div class="menu-card">
                        <img src="${m[3]}" alt="Dish">
                        <h4 style="color: #d4af37; margin: 10px 0 5px;">${m[1]}</h4>
                        <p style="margin: 0; font-weight: bold;">₹${m[2]}</p>
                        <button class="delete-btn" onclick="deleteMenuItem('${m[0]}')">🗑️ Delete</button>
                    </div>`;
                });
            });
        }

        function addNewMenuItem() {
            let name = document.getElementById('menuName').value;
            let price = document.getElementById('menuPrice').value;
            let imageFile = document.getElementById('menuImageFile').files[0];

            if(!name || !price || !imageFile) {
                alert("Please fill all fields and select an image file!");
                return;
            }

            let formData = new FormData();
            formData.append('name', name);
            formData.append('price', price);
            formData.append('image', imageFile);

            fetch('/add-menu-item', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                document.getElementById('menuName').value = "";
                document.getElementById('menuPrice').value = "";
                document.getElementById('menuImageFile').value = "";
                loadAdminMenu();
            });
        }

        function deleteMenuItem(id) {
            if(confirm("Are you sure you want to delete this dish?")) {
                fetch(`/delete-menu-item/${id}`, {
                    method: 'POST'
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    loadAdminMenu();
                });
            }
        }

        function clearAllOrders() {
            if(confirm("⚠️ Warning: Are you sure you want to delete ALL orders permanently?")) {
                fetch('/clear-all-orders', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    fetchAndShow('all');
                });
            }
        }

        function clearAllUsers() {
            if(confirm("⚠️ Warning: Are you sure you want to delete ALL registered users permanently?")) {
                fetch('/clear-all-users', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    loadRegisteredUsers();
                });
            }
        }
    </script>
</body>
</html>
