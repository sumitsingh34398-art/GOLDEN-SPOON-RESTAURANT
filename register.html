<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Golden Spoon Restaurant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url('assets/background-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-box {
            background: rgba(10, 10, 10, 0.92);
            padding: 35px 30px;
            border: 2px solid #d4af37;
            border-radius: 16px;
            color: white;
            text-align: center;
            width: 100%;
            max-width: 420px;
            margin: 15px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px rgba(212, 175, 55, 0.2);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0;
            border: 1px solid #d4af37;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #f3e5ab;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: linear-gradient(135deg, #e6c547, #d4af37);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
        }
        h2 { 
            color: #d4af37; 
            margin-top: 0; 
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            font-size: 26px;
            margin-bottom: 20px;
        }

        /* Professional Luxury Custom Modal Styles (Matching Ref Image) */
        .hidden { display: none !important; }
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: radial-gradient(circle at center, #181818 0%, #0c0c0c 100%);
            border: 2px solid #d4af37;
            padding: 35px 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1);
            color: white;
            animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            position: relative;
        }
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .modal-logo {
            width: 55px;
            height: 55px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .modal-logo span {
            font-size: 24px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: #e0e0e0;
            margin-bottom: 20px;
            font-weight: 400;
            font-family: 'Poppins', sans-serif;
        }

        .modal-content p {
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
            white-space: pre-line;
            color: #cccccc;
            letter-spacing: 0.3px;
            font-family: 'Poppins', sans-serif;
        }
        .modal-btn {
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            border: none;
            padding: 13px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            color: #000;
            width: 100%;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            font-family: 'Poppins', sans-serif;
        }
        .modal-btn:hover {
            background: linear-gradient(135deg, #e6c547, #d4af37);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>CREATE ACCOUNT</h2>
        
        <!-- Step 1: Details Form (Name, Phone, Email & Password) -->
        <div id="step1Form">
            <input type="text" id="name" placeholder="Enter Full Name">
            <input type="text" id="phone" placeholder="Enter Phone Number">
            <input type="email" id="email" placeholder="Enter Gmail (e.g. user@gmail.com)">
            <input type="password" id="password" placeholder="Create Password">
            <button onclick="sendOtpRequest()">SEND OTP</button>
        </div>

        <!-- Step 2: OTP Verification Form (Initially Hidden) -->
        <div id="step2Form" class="hidden">
            <p style="font-size: 13px; color: #d4af37; margin-bottom: 12px; font-weight: 500;">Please enter your 4-digit verification code below:</p>
            <input type="text" id="enteredOtp" placeholder="Enter 4-digit OTP" maxlength="4" style="text-align: center; font-size: 18px; letter-spacing: 5px;">
            <button onclick="verifyAndRegister()">VERIFY & SIGN UP</button>
        </div>

        <p style="font-size: 13px; margin-top: 20px; color: #bbb;">
            Already have an account? <a href="login.html" style="color: #d4af37; text-decoration: none; font-weight: 600;">Login here</a>
        </p>
    </div>

    <!-- Custom Professional Luxury Alert Modal Container -->
    <div id="customModal" class="custom-modal hidden">
        <div class="modal-content">
            <div class="modal-logo">
                <span>🍽️</span>
            </div>
            <h3 class="modal-title" id="modalTitle">GOLDEN SPOON</h3>
            <div class="modal-subtitle" id="modalSub">Restaurant Notification</div>
            <p id="modalMessage">Message here</p>
            <button class="modal-btn" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        let globalData = {};

        function showCustomAlert(message, callback = null, title = "GOLDEN SPOON", subtitle = "Notification") {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalSub').innerText = subtitle;
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('customModal').classList.remove('hidden');
            window.modalCallback = callback;
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }

        async function sendOtpRequest() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if(!name || !phone || !email || !password) {
                showCustomAlert("Please fill all the fields completely!", null, "INCOMPLETE DATA", "Please check your inputs");
                return;
            }

            globalData = { name, phone, email, password };

            try {
                const res = await fetch('/send-otp', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ email: email }) 
                });
                const result = await res.json();
                
                if(result.success) { 
                    const matchOtp = result.message.match(/\d{4}/);
                    const otpText = matchOtp ? matchOtp[0] : "1234";

                    showCustomAlert("Your Verification OTP Code is:\n\n" + otpText + "\n\nPlease enter this code to complete your signup.", () => {
                        document.getElementById('step1Form').classList.add('hidden');
                        document.getElementById('step2Form').classList.remove('hidden');
                    }, "VERIFICATION CODE", "Secure OTP Generated"); 
                } else { 
                    showCustomAlert(result.message || "Failed to generate OTP!", null, "ERROR", "System Alert"); 
                }
            } catch (err) {
                console.error("Error:", err);
                showCustomAlert("Something went wrong! Please check your connection.", null, "CONNECTION ERROR", "Network Issue");
            }
        }

        async function verifyAndRegister() {
            const otp = document.getElementById('enteredOtp').value.trim();

            if(!otp) {
                showCustomAlert("Please enter the verification OTP!", null, "OTP REQUIRED", "Verification Step");
                return;
            }

            try {
                const res = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: globalData.email, otp: otp })
                });
                const verifyResult = await res.json();

                if(verifyResult.success) {
                    const finalRes = await fetch('/register', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify(globalData) 
                    });
                    const result = await finalRes.json();

                    if(result.success) {
                        showCustomAlert("Registration Successful!\nWelcome to Golden Spoon Restaurant Website.\nYour account has been created successfully.", () => {
                            window.location.href = 'login.html';
                        }, "SUCCESS", "Account Created");
                    } else {
                        showCustomAlert(result.message || "Registration failed!", null, "FAILED", "Database Error");
                    }
                } else {
                    showCustomAlert(verifyResult.message || "Invalid or expired OTP code!", null, "INVALID OTP", "Verification Failed");
                }
            } catch (err) {
                console.error("Error:", err);
                showCustomAlert("Something went wrong during verification!", null, "SYSTEM ERROR", "Please try again");
            }
        }
    </script>
</body>
</html>
